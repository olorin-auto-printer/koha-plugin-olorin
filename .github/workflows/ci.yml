name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "41 4 * * *"
  workflow_dispatch:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  perl-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
      - name: Clone koha-testing-docker and Koha
        run: |
          git clone --depth 1 https://gitlab.com/koha-community/koha-testing-docker.git ktd
          git clone --depth 1 https://git.koha-community.org/Koha-community/Koha.git koha
      - name: Start KTD with the plugin mounted
        working-directory: ktd
        run: |
          cp env/defaults.env .env
          echo "SYNC_REPO=${GITHUB_WORKSPACE}/koha" >> .env
          echo "LOCAL_USER_ID=$(id -u)" >> .env
          cat > compose/plugin.yml <<EOF
          services:
            koha:
              volumes:
                - ${GITHUB_WORKSPACE}/plugin:/tmp/koha-plugin-olorin
          EOF
          docker compose --project-directory . --env-file .env \
            -f compose/base.yml -f compose/db-mariadb.yml \
            -f compose/local_ports.yml -f compose/plugin.yml up -d
      - name: Wait for Koha
        working-directory: ktd
        run: |
          # KTD touches /ktd_ready in the koha container once the database is
          # populated and services are up — the same marker its own
          # --wait-ready uses
          for i in $(seq 1 120); do
            if docker compose --project-directory . --env-file .env \
                -f compose/base.yml -f compose/db-mariadb.yml \
                -f compose/local_ports.yml -f compose/plugin.yml \
                exec -T koha bash -c '[ -e /ktd_ready ]' 2>/dev/null; then
              echo "KTD is ready"; exit 0
            fi
            sleep 10
          done
          echo "KTD never became ready"
          docker compose --project-directory . --env-file .env -f compose/base.yml -f compose/db-mariadb.yml -f compose/local_ports.yml -f compose/plugin.yml logs koha | tail -50
          exit 1
      - name: Run plugin tests
        working-directory: ktd
        run: |
          docker compose --project-directory . --env-file .env \
            -f compose/base.yml -f compose/db-mariadb.yml \
            -f compose/local_ports.yml -f compose/plugin.yml \
            exec -T koha koha-shell kohadev -c \
              "export PERL5LIB=/kohadevbox/koha:/kohadevbox/koha/lib && cd /tmp/koha-plugin-olorin && prove t/"

  build-kpz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/build-kpz.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: kpz
          path: dist/*.kpz
