name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: node scripts/build-kpz.mjs --tag "${GITHUB_REF_NAME}"
      - name: Attach the standalone client library
        run: cp Koha/Plugin/Com/OlorinAutoPrinter/Olorin/js/olorin.js dist/olorin.js
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.kpz
            dist/olorin.js
